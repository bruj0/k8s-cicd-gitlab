# HTTPRoute: openbao.local.bruj0.net → openbao-ui Service.
#
# The OpenBao chart creates a Service named `openbao-ui` in the `openbao`
# namespace on port 8200 (the standard OpenBao HTTP API + UI port).

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: openbao
  namespace: openbao
  labels:
    app.kubernetes.io/name: openbao
    app.kubernetes.io/part-of: blueprint-phase2
spec:
  parentRefs:
    - name: local-bruj0-net
      namespace: traefik
      sectionName: https
  hostnames:
    - openbao.local.bruj0.net
  rules:
    - matches:
        - path: { type: PathPrefix, value: / }
      backendRefs:
        - name: openbao-ui
          port: 8200