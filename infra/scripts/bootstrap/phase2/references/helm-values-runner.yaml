# GitLab Runner values for Phase 2.
#
# Single runner, Kubernetes executor, registers against the GitLab
# instance via a registration token fetched from OpenBao.
#
# The registration token is supplied at install-time via
# --set runnerToken=... (see phase2/runner.py:install).

# The chart's own release name is `gitlab-runner` (matches the namespace).
# Use the Kubernetes executor so each CI job runs in its own pod.

runners:
  # The GitLab instance is reached IN-CLUSTER via the GitLab
  # chart's `gitlab-webservice-default` Service on port 8181
  # (the chart-internal workhorse port). Using the external
  # `gitlab.local.bruj0.net:443` URL from inside the cluster
  # would force the runner pod to resolve the public hostname
  # and hit the Gateway — that round-trip is unnecessary and
  # in some environments (no DNS resolver for the public name)
  # the registration fails with `connect: connection refused`.
  # The runner container also has insecure-set so it can talk
  # to webservice's self-signed cert without cert errors.
  url: https://gitlab-webservice-default.gitlab.svc:8181
  insecure: true
  executor: kubernetes
  config: |
    [[runners]]
      [runners.kubernetes]
        namespace = "gitlab-runner"
        image = "alpine:latest"
      [runners.cache]
        Type = "local"
        [runners.cache.local]
          path = "/tmp"

# Resource limits for runner pods (each job). Iteration 2: tune for
# the actual workload (Go builds need more memory, etc.).
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# We don't want the runner to create its own ServiceAccount — the
# chart's default already gives it one with the right RBAC.
rbac:
  create: true

# Don't auto-register tags — leave it to the runner config to advertise
# itself generically. Iteration 2: add tags here once we know the job
# labels the apps use.
tags: ""