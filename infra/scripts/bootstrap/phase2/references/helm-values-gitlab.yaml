# GitLab CE values for Phase 2 (chart 10.1.1).
#
# Chart 10.x dropped the bundled PostgreSQL, Redis, and MinIO charts.
# This values file wires the GitLab chart to the three external
# services we install ourselves (CloudNativePG + bitnami/redis +
# minio/minio). The chart still owns nearly everything else —
# Gateway API + Envoy, the OpenBao subchart, Gitaly, etc.
#
# What we override:
#
#   - global.hosts.domain / externalIP — the chart uses these to
#      assemble `gitlab.<domain>` URLs. We use local.bruj0.net for
#      dev; the user updates DNS (or /etc/hosts) to the cluster IP
#      manually — see Phase 2's end-of-run handoff.
#
#      NOTE: `externalIP` is intentionally NOT empty. The chart's
#      `templates/gateway.yaml` uses it as the Gateway `spec.addresses`
#      source when `gatewayApiResources.gateway.addresses` is unset.
#      We block that path by setting `addresses: []` on the gateway
#      block below, so the operator's data-plane Service is created
#      without a `127.0.0.1` externalIP (which Kubernetes rejects as
#      loopback). externalIP is still needed for non-Gateway URL
#      assembly in NOTES.txt and a few sub-chart templates.
#
#   - global.ingress.enabled: false — we route via Gateway API.
#
#   - global.gatewayApi.* — turn on Envoy Gateway + chart-managed
#      Gateway. `configureCertmanager` is OFF so the chart's
#      self-signed-cert-job (pre-install hook) mints a wildcard
#      cert for `*.local.bruj0.net` and stores it in Secret
#      `gitlab-wildcard-tls` (plus `gitlab-wildcard-tls-ca`).
#
#   - global.psql.* — point at the external CloudNativePG cluster
#      we install in step 5/13. The password comes from Secret
#      `cnpg-role-passwords` field `gitlab` (deterministic
#      SHA-256-derived, written by CloudNativePGInstaller.snapshot_passwords).
#
#   - global.redis.* — point at the bitnami/redis chart we install
#      in step 6/13. Password comes from Secret `redis-password`.
#
#   - global.openbao.* — enable the chart-bundled OpenBao subchart
#      (which powers the GitLab Secrets Manager feature). PostgreSQL
#      backend pointed at the same external CloudNativePG cluster
#      (using the `openbao` role).
#
#   - global.appConfig.object_store + per-bucket config — point
#      all 10 GitLab buckets (lfs, artifacts, uploads, packages,
#      backups, terraform-state, ci-secure-files, pages,
#      dependency-proxy, snippets) at the standalone MinIO we
#      install in step 7/13.
#
#   - gatewayApiResources.gateway.listeners.gitlab-web.tls.certificateRefs[0].name
#      — chart default is `gitlab-tls` (cert-manager path). We
#      override to `gitlab-wildcard-tls` (self-signed path) so the
#      Gateway listener can find the Secret the chart's pre-install
#      Job creates.

global:
  edition: ce
  hosts:
    domain: local.bruj0.net
    externalIP: 127.0.0.1
    https: true
  # Ingress disabled — we route via Gateway API.
  ingress:
    enabled: false
    # Declare the global ingress TLS secret so the chart's
    # helper `gitlab.ingress.tls.configured` returns "true" and
    # the chart skips its cfssl-self-sign pre-install Job (which
    # would race / fail on an invalid ACME email). We mint this
    # secret ourselves in Phase 2 (step 9/13: wildcard certs) so
    # the Gateway listeners can resolve their certificateRefs.
    tls:
      secretName: gitlab-wildcard-tls
  # Activate the chart's Envoy Gateway sub-chart.
  gatewayApi:
    enabled: true
    installEnvoy: true
    # ConfigureCertmanager OFF → chart's pre-install hook
    # (templates/shared-secrets/self-signed-cert-job.yml) mints
    # a wildcard self-signed cert (Secret gitlab-wildcard-tls)
    # via cfssl-self-sign. The chart's NOTES.txt prints the
    # exact `kubectl get secret ... | base64 -d > ca.crt`
    # command so the user can trust the CA on their host.
    configureCertmanager: false
    httpToHttpsRedirect: true
  # Chart-managed Gateway (gitlab-gw). We use the chart's own
  # Gateway + HTTPRoutes for gitlab/registry/kas/minio; OpenBao
  # is reached via `kubectl port-forward` (no custom Gateway
  # needed — the bootstrap prints the port-forward command).
  gateway:
    enabled: true

  # --- External PostgreSQL (CloudNativePG cluster installed in step 5/13) ---
  # The password comes from Secret `cnpg-role-passwords` field
  # `gitlab`. That Secret is created by CloudNativePGInstaller
  # (snapshot_passwords) with a deterministic SHA-256-derived
  # password, so cluster recreate deterministically lands on the
  # same credentials.
  psql:
    host: postgresql-cnpg-rw.postgresql.svc.cluster.local
    port: 5432
    username: gitlab
    database: gitlabhq_production
    applicationName: gitlab
    password:
      secret: cnpg-role-passwords
      key: gitlab
    # main/ci tasks share the same DB by default. We leave them
    # empty so the chart falls back to the top-level psql settings.
    main: {}
    ci: {}

  # --- External Redis (bitnami/redis chart installed in step 6/13) ---
  # The password comes from Secret `redis-password`, auto-generated
  # by the bitnami chart and snapshotted to infra/secrets/redis-password.txt
  # by phase2/redis.py.
  redis:
    host: redis-master.redis.svc.cluster.local
    port: 6379
    auth:
      enabled: true
      secret: redis-password
      key: redis-password
    sentinelAuth:
      enabled: false

  # --- Chart-bundled OpenBao subchart (enables GitLab Secrets Manager) ---
  # `global.openbao.enabled: true` flips on the bundled OpenBao
  # subchart. The subchart auto-discovers the Chart-managed PG
  # backend via `psql.host` (same CloudNativePG we configured
  # above) and stores the GitLab Secrets Manager secrets there.
  openbao:
    enabled: true
    host: ""
    # httpAudit: telemetry for the Secrets Manager feature
    httpAudit:
      secret: openbao-http-audit-token
      key: token
    psql:
      # Point the OpenBao subchart's PostgreSQL backend at the
      # same CloudNativePG Cluster, using the `openbao` role
      # we created in step 5/13. Password from the same
      # cnpg-role-passwords Secret.
      host: postgresql-cnpg-rw.postgresql.svc.cluster.local
      port: 5432
      database: openbao
      username: openbao
      password:
        secret: cnpg-role-passwords
        key: openbao

  # --- External object storage (standalone MinIO installed in step 7/13) ---
  # Chart 10.x drops the bundled minio chart, so we wire each
  # bucket to the standalone MinIO we install in step 7/13.
  #
  # The `connection` Secret `gitlab-rails-storage` has a single
  # key `connection` containing the S3 connection YAML (provider,
  # aws_access_key_id, aws_secret_access_key, region, endpoint,
  # path_style). Bootstrap creates this Secret in step 7/13
  # from the MinIO root credentials snapshot.
  appConfig:
    secretBackend:
      type: kubernetes
      kubernetes:
        secretName: gitlab-secret-backend

    # Consolidated object store config — used by lfs/artifacts/
    # uploads/packages/etc. unless overridden below.
    object_store:
      enabled: true
      proxy_download: true
      connection:
        secret: gitlab-rails-storage
        key: connection

    # Per-bucket overrides (only set bucket names — connection is
    # inherited from the consolidated `object_store` above).
    lfs:
      enabled: true
      bucket: gitlab-lfs
    artifacts:
      enabled: true
      bucket: gitlab-artifacts
    uploads:
      enabled: true
      bucket: gitlab-uploads
    packages:
      enabled: true
      bucket: gitlab-packages
    externalDiffs:
      enabled: false
    terraformState:
      enabled: true
      bucket: gitlab-terraform-state
    ciSecureFiles:
      enabled: true
      bucket: gitlab-ci-secure-files
    dependencyProxy:
      enabled: true
      bucket: gitlab-dependency-proxy

    # Pages needs its own objectStore block (the consolidated
    # `object_store.connection` is inherited only when
    # `object_store.enabled` is true and pages doesn't override;
    # set the bucket explicitly).
    pages:
      enabled: true
      objectStore:
        enabled: true
        bucket: gitlab-pages

# Registry storage — chart 10.x dropped the bundled object store,
# so registry must point at our external MinIO. The check
# `gitlab.checkConfig.objectStorage.registry.configured` fires
# when `registry.enabled=true` (default) and `registry.storage.secret`
# isn't set.
#
# Note: `registry.storage` only accepts {secret, key, extraKey,
# redirect} keys (the bucket name is configured inside the Secret
# body itself, not in values). We also need the `gitlab-registry`
# bucket to exist in MinIO — see GITLAB_BUCKETS in minio.py.
registry:
  storage:
    secret: gitlab-rails-storage
    # The chart's registry sub-config block expects a key whose value is
    # the literal `storage:` YAML block (Docker registry schema, top
    # level `s3:`). We use the `config` key on a Secret that ALSO has
    # `connection` (used by Rails-side object storage readers).
    key: config

# Override the chart's default Gateway listener cert-ref. The chart
# default (`gitlab-tls`) is the name the chart uses for the
# cert-manager-issued cert. With configureCertmanager: false the
# chart instead mints `gitlab-wildcard-tls` (and `-ca`) via
# cfssl-self-sign. The Gateway listener needs to match.
#
# --- Data-plane Service (NodePort) + post-install patch ---
# Chart 10.x's gatewayApiResources.envoy.proxySpec default sets
# the data-plane Service type to LoadBalancer, expecting a
# provisioner (MetalLB, cloud-provider-kind, …) to allocate IPs.
# kind has no such provisioner, so we set type=NodePort below and
# let the bootstrap's `GitlabInstaller._patch_gateway_data_plane`
# re-pin the operator-picked NodePorts to fixed values (30080/30443/
# 30022). The data-plane is reachable from the host only via the
# bootstrap CLI's `kubectl port-forward` (binds 127.0.0.1:8443/8222
# to the Service's ClusterIP); kind does not publish NodePorts to
# the host.
#
# Also: `gatewayApiResources.gateway.addresses` is explicitly set to
# an empty list. The chart's `templates/gateway.yaml` would otherwise
# copy `global.hosts.externalIP` (= 127.0.0.1 in dev) into
# `spec.addresses`, and the Envoy Gateway operator then tries to
# create the data-plane Service with `externalIPs: [127.0.0.1]`,
# which Kubernetes rejects ("may not be in the loopback range
# 127.0.0.0/8"). Empty list = no Gateway addresses = no externalIPs
# on the operator-managed Service.
gatewayApiResources:
  envoy:
    proxySpec:
      provider:
        type: Kubernetes
        kubernetes:
          envoyService:
            type: NodePort
  gateway:
    # Empty list: prevents the chart from copying global.hosts.externalIP
    # into the Gateway's `spec.addresses`. See header comment above.
    addresses: []
  gateway:
    listeners:
      gitlab-web:
        tls:
          certificateRefs:
            - name: gitlab-wildcard-tls
        # 443 + NodePort 30443 → matches cluster.tf host:443 mapping.
        port: 443
        nodePort: 30443
      gitlab-web-geo:
        port: 443
        nodePort: 30443
      gitlab-smartcard-web:
        port: 443
        nodePort: 30443
      kas-web:
        port: 443
        nodePort: 30443
      kas-workspaces-web:
        port: 443
        nodePort: 30443
      registry-web:
        port: 443
        nodePort: 30443
      pages-web:
        port: 443
        nodePort: 30443
      openbao-web:
        port: 443
        nodePort: 30443
      http-default:
        port: 80
        nodePort: 30080
      gitlab-ssh:
        port: 22
        nodePort: 30022

# The chart-bundled GitLab Runner sub-chart registers against the
# GitLab instance via `gitlab-runner register`, which uses the
# `CI_SERVER_URL` env var (falling back to `global.hosts.domain`-based
# public URL when the env var is unset). Hitting the external URL
# (https://gitlab.local.bruj0.net) from inside the cluster forces
# the runner pod to round-trip through the public Gateway AND to
# trust the self-signed wildcard TLS — both unnecessary for in-cluster
# registration. The internal webservice Service listens on port
# 8181 (the chart-internal workhorse port) and speaks plain HTTP
# (TLS termination happens at the Gateway/Envoy above it, never at
# port 8181).
#
# The Runner sub-chart picks up `gitlab-runner.gitlabUrl` and
# injects it as CI_SERVER_URL. We also set `unregisterRunners: false`
# so re-running `helm upgrade` doesn't wipe the existing
# registration we just made.
gitlab-runner:
  gitlabUrl: http://gitlab-webservice-default.gitlab.svc:8181
  unregisterRunners: false
  runners:
    config: |
      [[runners]]
        [runners.kubernetes]
          namespace = "gitlab-runner"
          image = "ubuntu:22.04"
        [runners.cache]
          Type = "local"
          [runners.cache.local]
            path = "/tmp"

# Resource caps so GitLab fits on 3×8 GB kind workers.
# (Chart 19.x is heavier than 18.x — bumped from 4Gi to 8Gi in
# infra/tofu/variables.tf.)
#
# Also includes the toolbox backup object store config — the
# check `gitlab.checkConfig.objectStorage.backup.configured`
# reads `$.Values.gitlab.toolbox` (TOP-level `gitlab.toolbox`,
# NOT `global.gitlab.toolbox` — the subchart's `.Values.toolbox`
# is the outer chart's `.Values.gitlab.toolbox`).
gitlab:
  gitaly:
    persistence:
      # Gitaly uses volumeClaimTemplates and doesn't expose
      # existingClaim. Instead, we set storageClass=manual
      # so the StatefulSet's volumeClaimTemplate creates a
      # PVC that binds to our pre-created PV via selector
      # match (labels app=gitlab-gitaly, release=gitlab,
      # storage=default — these are stamped on the chart's
      # volumeClaimTemplate PVCs).
      storageClass: manual
  # Reduce Gitaly + webservice + sidekiq defaults — we run a
  # single instance of each (no HA, no autoscaling).
  webservice:
    deployment:
      replicas: 1
    minReplicas: 1
    maxReplicas: 1
  sidekiq:
    deployment:
      replicas: 1
    minReplicas: 1
    maxReplicas: 1
  # Backup target — chart's toolbox backs up to its own bucket.
  # Required to satisfy `gitlab.checkConfig.objectStorage.backup.configured`.
  toolbox:
    backups:
      objectStorage:
        backend: s3
        config:
          secret: gitlab-rails-storage
          key: connection

# --- chart-bundled OpenBao subchart activation ---
# The chart's top-level `openbao.install: false` default means the
# subchart is OFF by default. Flip it on so the OpenBao subchart
# deploys into the gitlab namespace and provides the Secrets
# Manager API to the GitLab rails app.
openbao:
  install: true
  # The subchart is configured via `global.openbao.*` (above).
  # We disable its bundled PG/Redis because chart 10.x's OpenBao
  # subchart shares the global `global.psql` and `global.redis`
  # settings. With `global.openbao.psql.*` set, the subchart
  # wires itself to the CloudNativePG cluster automatically.
  workhorse: {}
  # The OpenBao subchart exposes a chart-managed Gateway listener
  # so the Secrets Manager UI/API is reachable via
  # openbao.<domain>. The bootstrap does NOT expose it through the
  # chart-managed Gateway (we use `kubectl port-forward` instead
  # via `bootstrap secrets_cli ui`) because the chart's OpenBao
  # listener config is incompatible with our Gateway API TLS path.
  # So we disable the subchart's Gateway listener and rely on
  # in-cluster port-forwarding.
  ingress:
    enabled: false
  gatewayApi:
    enabled: false
  # Use static unsealing (the bootstrap generates the key into
  # the chart-managed `gitlab-openbao-unseal-key` Secret on first
  # install). See phase2/openbao.py + chart docs for the
  # secret rotation story.
  unseal:
    static:
      enabled: true