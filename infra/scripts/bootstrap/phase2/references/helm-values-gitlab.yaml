# GitLab CE values for Phase 2.
#
# The chart owns nearly everything. We override only what the chart
# doesn't pick from the cluster's runtime context:
#
#   - global.hosts.domain / externalIP — the chart uses these to
#      assemble `gitlab.<domain>` URLs and to bind the Gateway's
#      loadBalancer-style address. We use local.bruj0.net for dev;
#      the user updates DNS (or /etc/hosts) to the cluster IP
#      manually — see Phase 2's end-of-run handoff.
#
#   - global.ingress.enabled: false — we route via Gateway API.
#
#   - global.gatewayApi.* — turn on Envoy Gateway + chart-managed
#      Gateway. `configureCertmanager` is OFF so the chart's
#      self-signed-cert-job (pre-install hook) mints a wildcard
#      cert for `*.local.bruj0.net` and stores it in Secret
#      `gitlab-wildcard-tls` (plus `gitlab-wildcard-tls-ca`).
#
#   - gatewayApiResources.gateway.listeners.gitlab-web.tls.certificateRefs[0].name
#      — chart default is `gitlab-tls` (cert-manager path). We
#      override to `gitlab-wildcard-tls` (self-signed path) so the
#      Gateway listener can find the Secret the chart's pre-install
#      Job creates.
#
#   - resource caps on Postgres/Redis/MinIO to fit on the 3×4 GB
#      kind workers.

global:
  edition: ce
  hosts:
    domain: local.bruj0.net
    externalIP: 127.0.0.1
    https: true
  # Ingress disabled — we route via Gateway API.
  ingress:
    enabled: false
    # Declare the global ingress TLS secret so the chart's
    # helper `gitlab.ingress.tls.configured` returns "true" and
    # the chart skips its cfssl-self-sign pre-install Job (which
    # would race / fail on an invalid ACME email). We mint this
    # secret ourselves in Phase 2 (step: cert generation) so
    # the Gateway listeners can resolve their certificateRefs.
    tls:
      secretName: gitlab-wildcard-tls
  # Activate the chart's Envoy Gateway sub-chart.
  gatewayApi:
    enabled: true
    installEnvoy: true
    # ConfigureCertmanager OFF → chart's pre-install hook
    # (templates/shared-secrets/self-signed-cert-job.yml) mints
    # a wildcard self-signed cert (Secret gitlab-wildcard-tls)
    # via cfssl-self-sign. The chart's NOTES.txt prints the
    # exact `kubectl get secret ... | base64 -d > ca.crt`
    # command so the user can trust the CA on their host.
    configureCertmanager: false
    httpToHttpsRedirect: true
  # Chart-managed Gateway (gitlab-gw). We use the chart's own
  # Gateway + HTTPRoutes for gitlab/registry/kas/minio; OpenBao
  # is reached via `kubectl port-forward` (no custom Gateway
  # needed — the bootstrap prints the port-forward command).
  gateway:
    enabled: true
  # GitLab reads its initial root password from a Kubernetes
  # Secret that the GitlabInstaller writes after install.
  appConfig:
    secretBackend:
      type: kubernetes
      kubernetes:
        secretName: gitlab-secret-backend

# Override the chart's default Gateway listener cert-ref. The chart
# default (`gitlab-tls`) is the name the chart uses for the
# cert-manager-issued cert. With configureCertmanager: false the
# chart instead mints `gitlab-wildcard-tls` (and `-ca`) via
# cfssl-self-sign. The Gateway listener needs to match.
gatewayApiResources:
  gateway:
    listeners:
      gitlab-web:
        tls:
          certificateRefs:
            - name: gitlab-wildcard-tls

# Resource caps so GitLab fits on 3×4 GB kind workers.
postgresql:
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 1000m, memory: 1Gi }
  # Pin to the PV we pre-created in stable_storage.py so
  # `tofu destroy && tofu apply` preserves PostgreSQL data
  # (users, projects, CI variables). The PVC is
  # `gitlab-postgresql` in the `gitlab` namespace.
  primary:
    persistence:
      existingClaim: gitlab-postgresql

redis:
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits:   { cpu: 500m, memory: 256Mi }
  # Pin to the PV we pre-created in stable_storage.py so
  # job queue and rate limits survive cluster recreates.
  master:
    persistence:
      existingClaim: gitlab-redis

minio:
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits:   { cpu: 250m, memory: 256Mi }
  # Pin to the PV we pre-created in stable_storage.py (Flavor C:
  # pvc_with_volume_name). The chart's minio_pvc.yaml creates a
  # PVC named `gitlab-minio` and honours both `volumeName`
  # (primary binding) and `matchLabels` (secondary safety net) on
  # the PVC's spec — both pin to our pre-created PV. Without this
  # the chart would create a fresh ephemeral PVC backed by the
  # local-path provisioner and CI artifacts / LFS / uploads would
  # be lost on every cluster recreate.
  persistence:
    volumeName: pv-gitlab-minio
    # Same labels we stamp on the PV in stable_storage.py — the
    # chart forwards these to the PVC's `spec.selector.matchLabels`.
    matchLabels:
      app: minio
      release: gitlab
      blueprint/stable-volume: minio
      app.kubernetes.io/managed-by: blueprint-stable-storage

prometheus:
  server:
    persistentVolume:
      # Pin to the PV we pre-created in stable_storage.py so
      # metrics history survives cluster recreates. The prometheus
      # subchart (charts/prometheus/templates/deploy.yaml) keys off
      # `persistentVolume.existingClaim` and creates a PVC named
      # `gitlab-prometheus-server` when not pinned.
      existingClaim: gitlab-prometheus-server

gitlab:
  gitaly:
    persistence:
      # Gitaly uses volumeClaimTemplates and doesn't expose
      # existingClaim. Instead, we set storageClass=manual
      # so the StatefulSet's volumeClaimTemplate creates a
      # PVC that binds to our pre-created PV via selector
      # match (labels app=gitlab-gitaly, release=gitlab,
      # storage=default — these are stamped on the chart's
      # volumeClaimTemplate PVCs).
      storageClass: manual