# Traefik values for the Phase 2 reverse proxy.
#
# Kept minimal: enable the Gateway API provider, pin the port scheme we
# want (HTTP redirect to HTTPS, TLS on 8443, dashboard on 9000).
#
# The GatewayClass is created by Traefik's chart automatically when the
# Gateway provider is enabled. The Gateway + HTTPRoute resources in
# gateway.yaml + httproute-*.yaml reference that GatewayClass.

providers:
  kubernetesGateway:
    enabled: true
  kubernetesIngress:
    enabled: false   # we use Gateway API, not Ingress

# Don't deploy a Dashboard ingress — Traefik chart's default behaviour
# is to also create an Ingress for the dashboard. We don't want that.
ingressRoute:
  dashboard:
    enabled: false

service:
  spec:
    type: ClusterIP

# Port scheme:
#   - `web`      (8000) — exposed, will redirect everything to websecure.
#   - `websecure` (8443) — exposed, TLS termination for *.local.bruj0.net HTTPRoutes.
#   - `traefik`   (9000) — NOT exposed on the Service (we port-forward it
#                            manually in the user handoff). Setting
#                            `expose.default: false` keeps the entrypoint
#                            active inside the pod but hides port 9000
#                            from `kubectl get svc`.
ports:
  web:
    http:
      redirections:
        entryPoint:
          to: websecure
          permanent: true
          scheme: https
  websecure: {}
  traefik:
    expose:
      default: false
