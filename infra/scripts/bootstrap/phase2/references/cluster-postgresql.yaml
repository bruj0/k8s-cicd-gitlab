# CloudNativePG Cluster for chart 10.x external PostgreSQL.
#
# Single-instance (no replicas, no HA) — matches the blueprint's
# minimum-resource architecture. The CNPG operator manages the
# primary instance + WAL volume; bootstrap (initdb of `postgres` +
# `gitlabhq_production` + `openbao` databases) happens AFTER this
# manifest is applied, via phase2/cloudnative_pg.py:bootstrap_dbs().
#
# Storage: bound to the hostPath PV `pv-cnpg-data` (created by
# phase2/stable_storage.py with Flavor A `existing_claim`) so the
# cluster can recreate without losing data. Without this pin, CNPG
# would mint a fresh `pvc-<UUID>` on every install and lose all data.
#
# Why minimum: GitLab chart 10.x's Cloud Native architecture can
# optionally run a 3-instance HA CNPG cluster with replicas + WAL
# shipping. We deliberately don't: this blueprint is meant to fit a
# 64 GB dev laptop, and CNPG's value-add (failover, point-in-time
# recovery) doesn't help in a `tofu destroy && apply` workflow where
# the whole cluster gets recreated.
---
apiVersion: v1
kind: Namespace
metadata:
  name: postgresql
  labels:
    app.kubernetes.io/managed-by: blueprint
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgresql-cnpg
  namespace: postgresql
  labels:
    app.kubernetes.io/managed-by: blueprint-stable-storage
    blueprint/stable-volume: cnpg
spec:
  instances: 1

  # Bootstrap the in-pod PostgreSQL data directory. cnpg 1.30
  # moved initdb under `bootstrap` (was `initdb:` at top level
  # in 1.27 and earlier). The initdb block creates the `postgres`
  # superuser database; dataChecksums is on for PITR-friendliness
  # (cheap, never disabled in modern PG).
  bootstrap:
    initdb:
      database: postgres
      owner: postgres
      encoding: UTF8
      locale: C
      dataChecksums: true

  # Single PVC backed by our pre-created hostPath PV. The PVC name
  # matches what stable_storage.py pre-creates (Flavor A
  # `existing_claim`).
  storage:
    size: 8Gi
    storageClass: manual
    pvcTemplate:
      accessModes:
        - ReadWriteOnce
      storageClassName: manual
      volumeName: pv-cnpg-data
      resources:
        requests:
          storage: 8Gi

  # Resources: tuned to fit our 8Gi worker nodes. CNPG defaults to
  # generous limits; we cap to keep kind-node memory pressure low.
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

  # No HA, no monitoring, no extra plugins beyond what GitLab needs.
  # The btree_gist + pg_trgm + amcheck extensions GitLab expects are
  # enabled by the operator automatically (cnpg 1.30+).
  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "128MB"
      work_mem: "16MB"
      log_min_duration_statement: "1000"
  # cnpg 1.30 schema: only `enableSuperuserAccess` is accepted here
  # (`enableInstanceDiskUseOnExtendSize` was removed in 1.30).
  enableSuperuserAccess: true

  # No monitoring exporters — matches the no-monitoring-everywhere-
  # else rule. The cnpg operator auto-generates `<cluster>-superuser`,
  # `<cluster>-app`, and `<cluster>-rw` Service + Secret. We only
  # need the superuser Secret (for the bootstrap_dbs step) and the
  # rw Service (consumed by `global.psql.host` in chart values).
  monitoring:
    enablePodMonitor: false