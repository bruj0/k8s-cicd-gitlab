# HTTPRoute: gitlab.local.bruj0.net → gitlab-webservice Service.
#
# The GitLab chart creates a Service named `gitlab-webservice-default`
# in the `gitlab` namespace listening on port 8181. The chart's Ingress
# defaults route via that Service; we do the same here for the Gateway.
#
# The HTTPRoute attaches to the Gateway defined in gateway.yaml by name.
# Cross-namespace routes are allowed because the Gateway's listener
# has `allowedRoutes.namespaces.from: All`.

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gitlab
  namespace: gitlab
  labels:
    app.kubernetes.io/name: gitlab
    app.kubernetes.io/part-of: blueprint-phase2
spec:
  parentRefs:
    - name: local-bruj0-net
      namespace: traefik
      sectionName: https
  hostnames:
    - gitlab.local.bruj0.net
  rules:
    - matches:
        - path: { type: PathPrefix, value: / }
      backendRefs:
        - name: gitlab-webservice-default
          port: 8181