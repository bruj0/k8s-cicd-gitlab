apiVersion: apps/v1 #  for k8s versions before 1.9.0 use apps/v1beta2  and before 1.8.0 use extensions/v1beta1
kind: Deployment
metadata:
  name: frontend
spec:
  selector:
    matchLabels:
      app: guestbook
      tier: frontend
  replicas: {{ .Values.replicaCount }}
  template:
    metadata:
      labels:
        app: guestbook
        tier: frontend
    spec:
      containers:
      - name: guestbook-frontend
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        resources:
          requests:
            cpu: 100m
            memory: 100Mi
        env:
        - name: ENVIRONMENT
          value: {{ .Values.environment }}
        - name: SOURCE_VALUE
          value: {{ .Values.valuesOrigin }}
        - name: COMMON_TEST_VALUE1
          value: {{ .Values.common.testValue1 }}
        - name: COMMON_TEST_VALUE2
          value: {{ .Values.common.testValue2 }}
        - name: APP_VERSION
          #value: {{ .Values.image.tag }}
          value: {{ $version := splitList "-" .Values.image.tag }}{{ first $version }}
        - name: GET_HOSTS_FROM
          value: dns
          # If your cluster config does not include a dns service, then to
          # instead access environment variables to find service host
          # info, comment out the 'value: dns' line above, and uncomment the
          # line below:
          # value: env
        ports:
        - containerPort: 3000
